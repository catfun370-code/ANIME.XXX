<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ANIME LEGACY — أعظم عشرة في التاريخ</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,700;1,300;1,400&family=Cinzel+Decorative:wght@700;900&family=Noto+Naskh+Arabic:wght@400;600;700&family=Bebas+Neue&display=swap" rel="stylesheet">

<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
html{scroll-behavior:smooth;scroll-snap-type:y mandatory}
body{
  background:#000;
  color:#fff;
  font-family:'Noto Naskh Arabic',serif;
  overflow-x:hidden;
  cursor:none;
}

/* ===================== CURSOR ===================== */
#cur,#cur2{position:fixed;border-radius:50%;pointer-events:none;z-index:99999;transform:translate(-50%,-50%)}
#cur{width:8px;height:8px;background:#fff;transition:width .3s,height .3s,background .3s}
#cur2{width:36px;height:36px;border:1px solid rgba(255,255,255,.35);transition:width .4s,height .4s,opacity .4s}

/* ===================== INTRO SCREEN ===================== */
#intro{
  position:fixed;inset:0;z-index:9999;
  background:#000;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  transition:opacity 1.2s ease, transform 1.2s ease;
}
#intro.out{opacity:0;transform:scale(1.05);pointer-events:none}

.intro-logo{
  font-family:'Cinzel Decorative',serif;
  font-size:clamp(28px,6vw,72px);
  letter-spacing:.15em;
  background:linear-gradient(135deg,#fff 0%,rgba(255,255,255,.4) 50%,#fff 100%);
  background-size:200%;
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
  animation:introShimmer 2s ease infinite;
}
@keyframes introShimmer{0%,100%{background-position:0%}50%{background-position:100%}}

.intro-line{
  width:0;height:1px;background:#fff;margin-top:24px;
  animation:introLine 1.5s ease .5s forwards;
}
@keyframes introLine{to{width:200px}}

.intro-sub{
  font-family:'Cormorant Garamond',serif;
  font-size:13px;letter-spacing:6px;color:rgba(255,255,255,.4);
  margin-top:16px;opacity:0;
  animation:introFade 1s ease 1.2s forwards;
}
@keyframes introFade{to{opacity:1}}

.intro-count{
  position:absolute;bottom:60px;
  font-family:'Bebas Neue',sans-serif;
  font-size:12px;letter-spacing:6px;color:rgba(255,255,255,.25);
}
.intro-bar{
  position:absolute;bottom:40px;
  width:200px;height:1px;background:rgba(255,255,255,.1);
  overflow:hidden;
}
.intro-bar::after{
  content:'';position:absolute;inset:0;background:#fff;
  animation:introBarLoad 1.8s ease .3s forwards;
  transform:translateX(-100%);
}
@keyframes introBarLoad{to{transform:translateX(0)}}

/* ===================== NOISE OVERLAY ===================== */
#noise{
  position:fixed;inset:0;z-index:9998;pointer-events:none;opacity:.025;
  background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='.9' numOctaves='4'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
  animation:noiseAnim 1s steps(2) infinite;
}
@keyframes noiseAnim{0%{transform:translate(0,0)}25%{transform:translate(-1%,-1%)}50%{transform:translate(1%,0)}75%{transform:translate(0,1%)}100%{transform:translate(1%,-1%)}}

/* ===================== CANVAS BG ===================== */
#bgCanvas{position:fixed;inset:0;z-index:0;pointer-events:none}

/* ===================== SECTIONS ===================== */
.slide{
  position:relative;
  width:100vw;height:100vh;
  scroll-snap-align:start;
  overflow:hidden;
  display:flex;align-items:flex-end;
  z-index:1;
}

/* Full BG image */
.slide-bg{
  position:absolute;inset:0;
  background-size:cover;
  background-position:center;
  transform:scale(1.1);
  transition:transform 1.8s cubic-bezier(.16,1,.3,1),filter 1.8s ease;
  filter:brightness(.35) saturate(.6);
}
.slide.active .slide-bg{
  transform:scale(1);
  filter:brightness(.55) saturate(.85);
}

/* Cinematic letterbox */
.slide::before,.slide::after{
  content:'';position:absolute;left:0;right:0;z-index:2;
  background:#000;
  height:0;
  transition:height 1.2s cubic-bezier(.77,0,.175,1) .3s;
}
.slide::before{top:0}
.slide::after{bottom:0}
.slide.active::before,.slide.active::after{height:0}
.slide:not(.active)::before,.slide:not(.active)::after{height:0}

/* GRADIENT over image */
.slide-grad{
  position:absolute;inset:0;z-index:3;
  background:linear-gradient(
    135deg,
    rgba(0,0,0,.8) 0%,
    rgba(0,0,0,.3) 40%,
    transparent 60%,
    rgba(0,0,0,.6) 100%
  );
}

/* Color accent per slide */
.slide-accent{
  position:absolute;inset:0;z-index:2;
  opacity:0;
  transition:opacity 1.2s ease;
}
.slide.active .slide-accent{opacity:1}

/* ===================== CONTENT ===================== */
.slide-content{
  position:relative;z-index:10;
  padding:clamp(40px,6vw,80px) clamp(40px,8vw,120px);
  max-width:900px;
  transform:translateY(40px);
  opacity:0;
  transition:transform 1.2s cubic-bezier(.16,1,.3,1) .4s, opacity 1.2s ease .4s;
}
.slide.active .slide-content{transform:translateY(0);opacity:1}

.slide-num{
  font-family:'Bebas Neue',sans-serif;
  font-size:clamp(100px,18vw,240px);
  line-height:.8;
  color:transparent;
  -webkit-text-stroke:1px rgba(255,255,255,.08);
  position:absolute;
  top:clamp(20px,4vw,60px);
  left:clamp(40px,8vw,120px);
  z-index:9;
  letter-spacing:-.02em;
  pointer-events:none;
  transition:opacity 1.2s;
}
.slide.active .slide-num{-webkit-text-stroke:1px rgba(255,255,255,.15)}

.sc-genre{
  font-family:'Cormorant Garamond',serif;
  font-style:italic;
  font-size:clamp(12px,1.5vw,16px);
  letter-spacing:.35em;
  color:rgba(255,255,255,.5);
  margin-bottom:clamp(12px,2vw,20px);
  display:flex;align-items:center;gap:16px;
}
.sc-genre::before{content:'';display:block;width:40px;height:1px;background:currentColor}

.sc-title-ar{
  font-family:'Noto Naskh Arabic',serif;
  font-weight:700;
  font-size:clamp(36px,6vw,88px);
  line-height:1.05;
  color:#fff;
  margin-bottom:8px;
  direction:rtl;
  overflow:hidden;
}
.sc-title-ar span{
  display:block;
  transform:translateY(100%);
  opacity:0;
  transition:transform 1s cubic-bezier(.16,1,.3,1) .6s, opacity .8s ease .6s;
}
.slide.active .sc-title-ar span{transform:translateY(0);opacity:1}

.sc-title-en{
  font-family:'Bebas Neue',sans-serif;
  font-size:clamp(14px,2.5vw,32px);
  letter-spacing:.15em;
  margin-bottom:clamp(20px,3vw,36px);
  overflow:hidden;
}
.sc-title-en span{
  display:block;
  color:transparent;
  -webkit-text-stroke:1px rgba(255,255,255,.4);
  transform:translateY(100%);
  opacity:0;
  transition:transform 1s cubic-bezier(.16,1,.3,1) .75s, opacity .8s ease .75s;
}
.slide.active .sc-title-en span{transform:translateY(0);opacity:1}

.sc-divider{
  width:0;height:1px;
  margin-bottom:clamp(16px,2.5vw,28px);
  transition:width 1.2s cubic-bezier(.16,1,.3,1) .9s;
}
.slide.active .sc-divider{width:clamp(60px,8vw,120px)}

.sc-desc{
  font-size:clamp(13px,1.4vw,17px);
  line-height:1.9;
  color:rgba(255,255,255,.65);
  max-width:520px;
  transform:translateY(20px);
  opacity:0;
  transition:transform .9s ease 1s, opacity .9s ease 1s;
}
.slide.active .sc-desc{transform:translateY(0);opacity:1}

.sc-meta{
  display:flex;align-items:center;gap:clamp(16px,3vw,36px);
  margin-top:clamp(20px,3vw,36px);
  transform:translateY(20px);opacity:0;
  transition:transform .9s ease 1.1s, opacity .9s ease 1.1s;
}
.slide.active .sc-meta{transform:translateY(0);opacity:1}

.sc-score{
  font-family:'Bebas Neue',sans-serif;
  font-size:clamp(28px,4vw,52px);
  letter-spacing:.05em;
  line-height:1;
}
.sc-score-label{
  font-family:'Cormorant Garamond',serif;
  font-style:italic;
  font-size:11px;
  letter-spacing:.25em;
  color:rgba(255,255,255,.4);
  margin-top:4px;
}
.sc-year{
  font-family:'Bebas Neue',sans-serif;
  font-size:clamp(18px,2.5vw,32px);
  color:rgba(255,255,255,.3);
  letter-spacing:.1em;
}
.sc-rank-badge{
  font-family:'Cormorant Garamond',serif;
  font-style:italic;
  font-size:clamp(11px,1.3vw,14px);
  letter-spacing:.3em;
  padding:8px 20px;
  border:1px solid rgba(255,255,255,.2);
  color:rgba(255,255,255,.6);
}

/* ===================== SIDE NAV ===================== */
#sidenav{
  position:fixed;
  left:clamp(16px,3vw,40px);
  top:50%;transform:translateY(-50%);
  z-index:100;
  display:flex;flex-direction:column;gap:12px;
}
.sn-dot{
  width:6px;height:6px;
  border-radius:50%;
  border:1px solid rgba(255,255,255,.3);
  cursor:pointer;
  transition:all .4s ease;
  position:relative;
}
.sn-dot.on{
  background:#fff;
  border-color:#fff;
  transform:scale(1.4);
  box-shadow:0 0 12px rgba(255,255,255,.5);
}
.sn-dot::after{
  content:attr(data-label);
  position:absolute;
  left:18px;top:50%;transform:translateY(-50%);
  font-family:'Cormorant Garamond',serif;
  font-style:italic;
  font-size:11px;
  letter-spacing:.2em;
  color:rgba(255,255,255,.5);
  white-space:nowrap;
  opacity:0;
  transition:opacity .3s;
}
.sn-dot:hover::after,.sn-dot.on::after{opacity:1}

/* ===================== HERO SLIDE ===================== */
#hero-slide{
  scroll-snap-align:start;
  position:relative;width:100vw;height:100vh;
  overflow:hidden;
  display:flex;align-items:center;justify-content:center;
  flex-direction:column;
  z-index:1;
}
.hero-canvas-bg{position:absolute;inset:0;z-index:0}

.hero-text-wrap{position:relative;z-index:5;text-align:center;padding:20px}

.hero-pre{
  font-family:'Cormorant Garamond',serif;
  font-style:italic;
  font-size:clamp(12px,2vw,18px);
  letter-spacing:.5em;
  color:rgba(255,255,255,.3);
  display:block;
  margin-bottom:28px;
  animation:hFade 1.5s ease .5s both;
}
.hero-main{
  font-family:'Cinzel Decorative',serif;
  font-size:clamp(42px,9vw,130px);
  font-weight:900;
  line-height:.95;
  letter-spacing:-.01em;
  animation:hSlide 1.5s cubic-bezier(.16,1,.3,1) .7s both;
}
.hero-main .line1{
  display:block;
  background:linear-gradient(180deg,#fff 40%,rgba(255,255,255,.5) 100%);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
}
.hero-main .line2{
  display:block;
  color:transparent;
  -webkit-text-stroke:1px rgba(255,255,255,.6);
  font-size:.65em;
  letter-spacing:.12em;
  margin-top:8px;
}
.hero-sub{
  font-family:'Noto Naskh Arabic',serif;
  font-size:clamp(14px,2vw,22px);
  color:rgba(255,255,255,.35);
  margin-top:28px;
  letter-spacing:.1em;
  animation:hFade 1.5s ease 1.2s both;
}
.hero-ornament{
  display:flex;align-items:center;gap:20px;
  margin-top:40px;
  animation:hFade 1.5s ease 1.5s both;
}
.ho-line{width:clamp(40px,8vw,100px);height:1px;background:rgba(255,255,255,.2)}
.ho-diamond{
  width:8px;height:8px;
  background:rgba(255,255,255,.6);
  transform:rotate(45deg);
  box-shadow:0 0 20px rgba(255,255,255,.4);
}
.hero-scroll{
  position:absolute;bottom:40px;left:50%;transform:translateX(-50%);
  display:flex;flex-direction:column;align-items:center;gap:8px;
  animation:hFade 1.5s ease 2s both;
  z-index:5;
}
.hs-text{font-family:'Cormorant Garamond',serif;font-style:italic;font-size:10px;letter-spacing:.4em;color:rgba(255,255,255,.3)}
.hs-line{width:1px;height:50px;background:linear-gradient(to bottom,rgba(255,255,255,.4),transparent);animation:hscroll 2s ease-in-out infinite}
@keyframes hscroll{0%,100%{transform:scaleY(1);opacity:.5}50%{transform:scaleY(1.2);opacity:1}}

@keyframes hFade{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
@keyframes hSlide{from{opacity:0;transform:translateY(60px) skewY(2deg)}to{opacity:1;transform:translateY(0) skewY(0)}}

/* ===================== PROGRESS BAR ===================== */
#progress{
  position:fixed;top:0;left:0;right:0;height:2px;z-index:1000;
  background:rgba(255,255,255,.06);
}
#progress-bar{height:100%;background:#fff;width:0;transition:width .4s ease}

/* ===================== SLIDE COUNT ===================== */
#slidecount{
  position:fixed;right:clamp(16px,3vw,40px);bottom:40px;
  z-index:100;
  font-family:'Bebas Neue',sans-serif;
  letter-spacing:.15em;
  font-size:12px;
  color:rgba(255,255,255,.3);
}
#slidecount strong{color:#fff;font-size:20px}

/* ===================== SCROLL HINT ===================== */
.scroll-hint-fixed{
  position:fixed;right:clamp(16px,3vw,40px);top:50%;
  transform:translateY(-50%);
  z-index:100;
  writing-mode:vertical-rl;
  font-family:'Cormorant Garamond',serif;
  font-style:italic;
  font-size:10px;
  letter-spacing:.4em;
  color:rgba(255,255,255,.2);
}
</style>
</head>

<!-- INTRO -->
<div id="intro">
  <div class="intro-logo">ANIME LEGACY</div>
  <div class="intro-line"></div>

  <div class="intro-bar"></div>
</div>

<!-- NOISE -->
<div id="noise"></div>

<!-- BG CANVAS -->
<canvas id="bgCanvas"></canvas>

<!-- CURSOR -->
<div id="cur"></div>
<div id="cur2"></div>

<!-- PROGRESS -->
<div id="progress"><div id="progress-bar"></div></div>

<!-- SIDE NAV -->
<div id="sidenav"></div>

<!-- SLIDE COUNT -->
<div id="slidecount"><strong id="cur-num">0</strong> / 10</div>

<!-- SCROLL HINT -->

<!-- ========================= HERO ========================= -->
<section id="hero-slide" data-index="0">

  <div class="hero-scroll">

</section>

<!-- ========================= ANIME SLIDES ========================= -->
<div id="slides-wrap"></div>

/* ==================== BUILD SLIDES ==================== */
const wrap = document.getElementById('slides-wrap');
const nav  = document.getElementById('sidenav');

animes.forEach((a,i)=>{
  // Slide
  const s = document.createElement('section');
  s.className='slide';
  s.dataset.index = i+1;
  s.innerHTML=`
    <div class="slide-bg" style="background-image:url('${a.img}')" onerror="this.style.backgroundImage='url(${a.fallback})'"></div>
    <div class="slide-grad"></div>
    <div class="slide-accent" style="background:radial-gradient(ellipse 60% 80% at 0% 100%,${a.accent},transparent)"></div>
    <div class="slide-num">${a.num}</div>
    <div class="slide-content">
      <div class="sc-genre">${a.genre}</div>
      <h2 class="sc-title-ar"><span>${a.title}</span></h2>
      <div class="sc-title-en"><span>${a.en}</span></div>
      <div class="sc-divider" style="background:${a.color}0.8)"></div>
      <p class="sc-desc">${a.desc}</p>
      <div class="sc-meta">
        <div>
          <div class="sc-score" style="color:${a.color}1)">${a.score}<span style="font-size:.4em;color:rgba(255,255,255,.3)">/10</span></div>
          <div class="sc-score-label">MAL SCORE</div>
        </div>
        <div class="sc-year">${a.year}</div>
        <div class="sc-rank-badge">المرتبة ${a.rank}</div>
      </div>
    </div>`;
  wrap.appendChild(s);

  // Nav dot
  const d=document.createElement('div');

/* ==================== ALL SLIDES ==================== */
const allSlides = [document.getElementById('hero-slide'), ...document.querySelectorAll('.slide')];
let currentIdx=0;

function scrollToSlide(idx){
  allSlides[idx]?.scrollIntoView({behavior:'smooth'});
}

/* ==================== INTERSECTION OBSERVER ==================== */
const io = new IntersectionObserver(entries=>{
  entries.forEach(e=>{
    if(e.intersectionRatio>.5){
      const idx = parseInt(e.target.dataset.index)||0;
      currentIdx=idx;
      // Activate
      allSlides.forEach(s=>s.classList.remove('active'));
      e.target.classList.add('active');
      // Nav
      document.querySelectorAll('.sn-dot').forEach((d,i)=>{
        d.classList.toggle('on', i===idx-1);
      });
      // Count
      document.getElementById('cur-num').textContent = idx===0?'—':idx;
      // Progress
      document.getElementById('progress-bar').style.width = idx===0?'0':((idx/10)*100)+'%';
    }
  });
},{threshold:.5});

allSlides.forEach(s=>io.observe(s));
// Activate hero on load
setTimeout(()=>allSlides[0].classList.add('active'),100);

/* ==================== CURSOR ==================== */
const cur=document.getElementById('cur'), cur2=document.getElementById('cur2');
let mx=0,my=0,rx=0,ry=0;
document.addEventListener('mousemove',e=>{mx=e.clientX;my=e.clientY});
(function ac(){
  rx+=(mx-rx)*.14; ry+=(my-ry)*.14;
  cur.style.cssText=`left:${mx}px;top:${my}px`;
  cur2.style.cssText=`left:${rx}px;top:${ry}px`;
  requestAnimationFrame(ac);
})();

/* ==================== HERO CANVAS ==================== */
(function heroCanvas(){
  const c=document.getElementById('heroCanvas');
  const ctx=c.getContext('2d');
  let W,H;
  function resize(){W=c.width=c.offsetWidth;H=c.height=c.offsetHeight}
  resize();
  new ResizeObserver(resize).observe(c);

  const stars=Array.from({length:200},()=>({
    x:Math.random(), y:Math.random(),
    r:Math.random()*1.2+.2,
    a:Math.random(),
    va:(Math.random()-.5)*.002,
    vx:(Math.random()-.5)*.0002,
    vy:(Math.random()-.5)*.0002
  }));

  // Aurora bands
  const bands=[
    {y:.3,w:.4,c:'rgba(60,200,255,',a:0,va:.003,vx:.0005},
    {y:.6,w:.35,c:'rgba(120,60,220,',a:0,va:.002,vx:-.0004},
    {y:.45,w:.5,c:'rgba(20,180,120,',a:0,va:.0025,vx:.0003},
  ];

  let t=0;
  function draw(){
    ctx.clearRect(0,0,W,H);
    ctx.fillStyle='#000';
    ctx.fillRect(0,0,W,H);

    // Aurora
    bands.forEach(b=>{
      b.a+=b.va; if(b.a>0.06||b.a<0) b.va*=-1;
      b.y+=b.vy; if(b.y<.2||b.y>.8) b.vy*=-1;
      const grd=ctx.createRadialGradient(W*.5,H*b.y,0,W*.5,H*b.y,W*b.w);
      grd.addColorStop(0,b.c+Math.abs(b.a)+')');
      grd.addColorStop(1,b.c+'0)');
      ctx.fillStyle=grd;
      ctx.fillRect(0,0,W,H);
    });

    // Stars
    stars.forEach(s=>{
      s.a+=s.va; if(s.a>1||s.a<.1) s.va*=-1;
      s.x+=s.vx; s.y+=s.vy;
      if(s.x<0)s.x=1; if(s.x>1)s.x=0;
      if(s.y<0)s.y=1; if(s.y>1)s.y=0;
      ctx.beginPath();
      ctx.arc(s.x*W,s.y*H,s.r,0,Math.PI*2);
      ctx.fillStyle=`rgba(255,255,255,${s.a*.8})`;
      ctx.fill();
    });

    t++;
    requestAnimationFrame(draw);
  }
  draw();
})();

/* ==================== BG CANVAS ==================== */
(function bgCanvas(){
  const c=document.getElementById('bgCanvas');
  const ctx=c.getContext('2d');
  let W,H;
  function resize(){W=c.width=innerWidth;H=c.height=innerHeight}
  resize(); window.addEventListener('resize',resize);

  const pts=Array.from({length:80},()=>({
    x:Math.random()*innerWidth, y:Math.random()*innerHeight,
    vx:(Math.random()-.5)*.15, vy:(Math.random()-.5)*.15,
    r:Math.random()*1+.2,
    a:Math.random()*.3+.05
  }));

  function draw(){
    ctx.clearRect(0,0,W,H);
    pts.forEach(p=>{
      p.x+=p.vx; p.y+=p.vy;
      if(p.x<0)p.x=W; if(p.x>W)p.x=0;
      if(p.y<0)p.y=H; if(p.y>H)p.y=0;
      ctx.beginPath();
      ctx.arc(p.x,p.y,p.r,0,Math.PI*2);
      ctx.fillStyle=`rgba(255,255,255,${p.a})`;
      ctx.fill();
    });
    // Lines
    for(let i=0;i<pts.length;i++){
      for(let j=i+1;j<pts.length;j++){
        const dx=pts[i].x-pts[j].x, dy=pts[i].y-pts[j].y;
        const d=Math.sqrt(dx*dx+dy*dy);
        if(d<120){
          ctx.beginPath();
          ctx.moveTo(pts[i].x,pts[i].y);
          ctx.lineTo(pts[j].x,pts[j].y);
          ctx.strokeStyle=`rgba(255,255,255,${(1-d/120)*.04})`;
          ctx.lineWidth=.5;
          ctx.stroke();
        }
      }
    }
    requestAnimationFrame(draw);
  }
  draw();
})();

/* ==================== KEYBOARD ==================== */
document.addEventListener('keydown',e=>{
  if(e.key==='ArrowDown'||e.key==='PageDown') scrollToSlide(Math.min(currentIdx+1,10));
  if(e.key==='ArrowUp'||e.key==='PageUp')    scrollToSlide(Math.max(currentIdx-1,0));
});

setTimeout(()=>document.getElementById('intro').classList.add('out'),2200);

/* ==================== IMAGE FALLBACK ==================== */
document.querySelectorAll('.slide-bg').forEach(el=>{
  const img=new Image();
  const src=el.style.backgroundImage.slice(5,-2).replace(/['"]/g,'');
  img.onerror=()=>{
    const fb=el.getAttribute('data-fallback')||'';
    if(fb) el.style.backgroundImage=`url('${fb}')`;
  };
  img.src=src;
});

// Fix fallback for slide-bg
document.querySelectorAll('.slide').forEach((slide,i)=>{
  const bg=slide.querySelector('.slide-bg');
  const main=animes[i].img;
  const fall=animes[i].fallback;
  const test=new Image();
  test.onerror=()=>{ bg.style.backgroundImage=`url('${fall}')` };
  test.src=main;
});
</script>
